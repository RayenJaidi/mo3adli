<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Moyenne Semestre</title>

<style>
body{
font-family: Arial;
background:#f4f6f9;
padding:20px;
}

h1{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
margin-bottom:30px;
background:white;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#2c7be5;
color:white;
}

.module{
background:#dfefff;
font-weight:bold;
}

input{
width:60px;
padding:4px;
}

button{
padding:10px 20px;
font-size:16px;
background:#2c7be5;
color:white;
border:none;
cursor:pointer;
}

.result{
font-size:22px;
font-weight:bold;
text-align:center;
margin-top:20px;
}
</style>

<script>
function calcMatiere(td,ds,exam){
td=parseFloat(td)||0;
ds=parseFloat(ds)||0;
exam=parseFloat(exam)||0;
return (td*0.1+ds*0.2+exam*0.7);
}

function calculer(){

// CPOO
let si = calcMatiere(
document.getElementById("si_td").value,
document.getElementById("si_ds").value,
document.getElementById("si_ex").value);

let java = calcMatiere(
document.getElementById("java_td").value,
document.getElementById("java_ds").value,
document.getElementById("java_ex").value);

let moyCpoo = (si + java)/2;

// Probabilité
let proba = calcMatiere(
document.getElementById("proba_td").value,
document.getElementById("proba_ds").value,
document.getElementById("proba_ex").value);

// Automates
let tla = calcMatiere(
document.getElementById("tla_td").value,
document.getElementById("tla_ds").value,
document.getElementById("tla_ex").value);

let graph = calcMatiere(
document.getElementById("graph_td").value,
document.getElementById("graph_ds").value,
document.getElementById("graph_ex").value);

let moyAuto = (tla + graph)/2;

// BD
let bd = calcMatiere(
document.getElementById("bd_td").value,
document.getElementById("bd_ds").value,
document.getElementById("bd_ex").value);

let reseau = calcMatiere(
document.getElementById("res_td").value,
document.getElementById("res_ds").value,
document.getElementById("res_ex").value);

let moyBD = (bd + reseau)/2;

// Langue
let ang = calcMatiere(
document.getElementById("ang_td").value,
document.getElementById("ang_ds").value,
document.getElementById("ang_ex").value);

let gest = calcMatiere(
document.getElementById("gest_td").value,
document.getElementById("gest_ds").value,
document.getElementById("gest_ex").value);

let moyLang = (ang + gest)/2;

// Option
let ent = calcMatiere(
document.getElementById("ent_td").value,
document.getElementById("ent_ds").value,
document.getElementById("ent_ex").value);

let sys = calcMatiere(
document.getElementById("sys_td").value,
document.getElementById("sys_ds").value,
document.getElementById("sys_ex").value);

let moyOpt = (ent + sys)/2;

// afficher moyennes modules
document.getElementById("m_cpoo").innerHTML = moyCpoo.toFixed(2);
document.getElementById("m_proba").innerHTML = proba.toFixed(2);
document.getElementById("m_auto").innerHTML = moyAuto.toFixed(2);
document.getElementById("m_bd").innerHTML = moyBD.toFixed(2);
document.getElementById("m_lang").innerHTML = moyLang.toFixed(2);
document.getElementById("m_opt").innerHTML = moyOpt.toFixed(2);

// moyenne générale
let moyenne =
(moyCpoo*3.5 + proba*2 + moyAuto*2 + moyBD*2.5 + moyLang*2 + moyOpt*3) /
(3.5+2+2+2.5+2+3);

document.getElementById("moyenne").innerHTML =
"Moyenne générale : " + moyenne.toFixed(2);
}
</script>

</head>

<body>

<h1>Calcul Moyenne Semestre</h1>

<table>
<tr>
<th>Module</th>
<th>Matière</th>
<th>TD / TP</th>
<th>DS</th>
<th>Examen</th>
<th>Moyenne </th>
<th>Moyenne Module</th>
</tr>

<tr class="module">
<td rowspan="2">CPOO</td>
<td>SI</td>
<td><input id="si_td" type="number"></td>
<td><input id="si_ds" type="number"></td>
<td><input id="si_ex" type="number"></td>
<td rowspan="2" id="m_cpoo">0</td>
</tr>

<tr>
<td>Java</td>
<td><input id="java_td" type="number"></td>
<td><input id="java_ds" type="number"></td>
<td><input id="java_ex" type="number"></td>
</tr>

<tr class="module">
<td>Probabilité</td>
<td>Probabilité et Statistique</td>
<td><input id="proba_td" type="number"></td>
<td><input id="proba_ds" type="number"></td>
<td><input id="proba_ex" type="number"></td>
<td id="m_proba">0</td>
</tr>

<tr class="module">
<td rowspan="2">Automates</td>
<td>TLA</td>
<td><input id="tla_td" type="number"></td>
<td><input id="tla_ds" type="number"></td>
<td><input id="tla_ex" type="number"></td>
<td rowspan="2" id="m_auto">0</td>
</tr>

<tr>
<td>Graphes</td>
<td><input id="graph_td" type="number"></td>
<td><input id="graph_ds" type="number"></td>
<td><input id="graph_ex" type="number"></td>
</tr>

<tr class="module">
<td rowspan="2">Bases de données</td>
<td>Ingénierie BD</td>
<td><input id="bd_td" type="number"></td>
<td><input id="bd_ds" type="number"></td>
<td><input id="bd_ex" type="number"></td>
<td rowspan="2" id="m_bd">0</td>
</tr>

<tr>
<td>Réseaux</td>
<td><input id="res_td" type="number"></td>
<td><input id="res_ds" type="number"></td>
<td><input id="res_ex" type="number"></td>
</tr>

<tr class="module">
<td rowspan="2">Langue et culture</td>
<td>Anglais</td>
<td><input id="ang_td" type="number"></td>
<td><input id="ang_ds" type="number"></td>
<td><input id="ang_ex" type="number"></td>
<td rowspan="2" id="m_lang">0</td>
</tr>

<tr>
<td>Gestion</td>
<td><input id="gest_td" type="number"></td>
<td><input id="gest_ds" type="number"></td>
<td><input id="gest_ex" type="number"></td>
</tr>

<tr class="module">
<td rowspan="2">UE Optionnelle</td>
<td>Entreprise System</td>
<td><input id="ent_td" type="number"></td>
<td><input id="ent_ds" type="number"></td>
<td><input id="ent_ex" type="number"></td>
<td rowspan="2" id="m_opt">0</td>
</tr>

<tr>
<td>System Modeling</td>
<td><input id="sys_td" type="number"></td>
<td><input id="sys_ds" type="number"></td>
<td><input id="sys_ex" type="number"></td>
</tr>

</table>

<div style="text-align:center;">
<button onclick="calculer()">Calculer les moyennes</button>
</div>

<div class="result" id="moyenne"></div>

</body>
</html>
